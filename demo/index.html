<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>reconciler demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #0b0e14;
        color: #d7dce5;
        display: flex;
        justify-content: center;
        padding: 3rem 1rem;
      }
      #root {
        width: 100%;
        max-width: 32rem;
      }
      h1 {
        font-size: 1.4rem;
        letter-spacing: -0.01em;
      }
      .card {
        background: #141a24;
        border: 1px solid #232c3a;
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        margin-bottom: 1.5rem;
      }
      button {
        background: #2b6cff;
        color: white;
        border: 0;
        border-radius: 8px;
        padding: 0.45rem 0.9rem;
        font-size: 0.95rem;
        cursor: pointer;
      }
      button.secondary {
        background: #232c3a;
      }
      .row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 1rem 0 0;
      }
      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 0.75rem;
        border: 1px solid #232c3a;
        border-radius: 8px;
        margin-bottom: 0.5rem;
        background: #0f141d;
      }
      input {
        flex: 1;
        background: #0f141d;
        border: 1px solid #232c3a;
        border-radius: 8px;
        color: inherit;
        padding: 0.45rem 0.6rem;
      }
      .done {
        text-decoration: line-through;
        opacity: 0.5;
      }
      .muted {
        opacity: 0.6;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
